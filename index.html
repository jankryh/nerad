<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jízdní řád z a do Řeže</title>
    <meta name="description" content="Aktuální odjezdy vlaků S4 a autobusů 371 z a do Řeže" />
    <style>
      /* Prevent white flash - simple dark background */
      html, body {
        background-color: #0a1628;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <!-- SVG Liquid Glass Filters (iOS 26 style) -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <filter id="liquid-glass" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="0.02" result="blur" />
        <feDisplacementMap in="SourceGraphic" in2="blur" scale="77" xChannelSelector="R" yChannelSelector="G" />
      </filter>
      <filter id="liquid-glass-subtle" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="42" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="0.02" result="blur" />
        <feDisplacementMap in="SourceGraphic" in2="blur" scale="50" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
