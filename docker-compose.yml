version: '3.8'

services:
  rez-jizdni-rad:
    build:
      context: .
      args:
        VITE_PID_API_BASE_URL: /api
    container_name: rez-jizdni-rad
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - TZ=Europe/Prague
      - PID_API_KEY=${PID_API_KEY}
    env_file:
      - .env
    labels:
      - "com.docker.compose.project=rez-jizdni-rad"
      - "description=Jízdní řád z a do Řeže - React aplikace"
